<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carry On Logistics</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="logo">
        <span class="logo-icon">📦</span>
        <span class="logo-text">Carry On <strong>Logistics</strong></span>
      </div>
      <nav>
        <button class="nav-btn active" data-view="dashboard">Dashboard</button>
        <button class="nav-btn" data-view="shipments">Shipments</button>
        <button class="nav-btn" data-view="create">New Shipment</button>
        <button class="nav-btn" data-view="track">Track</button>
      </nav>
    </div>
  </header>

  <main class="container">

    <!-- Dashboard ─────────────────────────────── -->
    <section id="view-dashboard" class="view active">
      <h1 class="page-title">Dashboard</h1>
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card">
          <span class="stat-label">Total</span>
          <span class="stat-value" id="stat-total">–</span>
        </div>
        <div class="stat-card pending">
          <span class="stat-label">Pending</span>
          <span class="stat-value" id="stat-pending">–</span>
        </div>
        <div class="stat-card in-transit">
          <span class="stat-label">In Transit</span>
          <span class="stat-value" id="stat-in_transit">–</span>
        </div>
        <div class="stat-card out-delivery">
          <span class="stat-label">Out for Delivery</span>
          <span class="stat-value" id="stat-out_for_delivery">–</span>
        </div>
        <div class="stat-card delivered">
          <span class="stat-label">Delivered</span>
          <span class="stat-value" id="stat-delivered">–</span>
        </div>
        <div class="stat-card cancelled">
          <span class="stat-label">Cancelled</span>
          <span class="stat-value" id="stat-cancelled">–</span>
        </div>
      </div>

      <h2 class="section-title">Recent Shipments</h2>
      <div id="recent-shipments"></div>
    </section>

    <!-- Shipments List ────────────────────────── -->
    <section id="view-shipments" class="view">
      <div class="list-header">
        <h1 class="page-title">All Shipments</h1>
        <div class="list-controls">
          <select id="filter-status" class="select-input">
            <option value="">All statuses</option>
            <option value="pending">Pending</option>
            <option value="in_transit">In Transit</option>
            <option value="out_for_delivery">Out for Delivery</option>
            <option value="delivered">Delivered</option>
            <option value="cancelled">Cancelled</option>
          </select>
        </div>
      </div>
      <div id="shipments-list"></div>
    </section>

    <!-- Create Shipment ───────────────────────── -->
    <section id="view-create" class="view">
      <h1 class="page-title">New Shipment</h1>
      <form id="create-form" class="card form-card">
        <div class="form-row">
          <div class="form-group">
            <label for="senderName">Sender Name *</label>
            <input type="text" id="senderName" placeholder="John Smith" required />
          </div>
          <div class="form-group">
            <label for="recipientName">Recipient Name *</label>
            <input type="text" id="recipientName" placeholder="Jane Doe" required />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="origin">Origin *</label>
            <input type="text" id="origin" placeholder="New York, NY" required />
          </div>
          <div class="form-group">
            <label for="destination">Destination *</label>
            <input type="text" id="destination" placeholder="Los Angeles, CA" required />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="weight">Weight (kg)</label>
            <input type="number" id="weight" placeholder="0.0" min="0.01" step="0.01" />
          </div>
          <div class="form-group">
            <label for="description">Description</label>
            <input type="text" id="description" placeholder="Package contents…" />
          </div>
        </div>
        <div id="create-error" class="alert alert-error hidden"></div>
        <div id="create-success" class="alert alert-success hidden"></div>
        <button type="submit" class="btn btn-primary btn-full">Create Shipment</button>
      </form>
    </section>

    <!-- Track Shipment ────────────────────────── -->
    <section id="view-track" class="view">
      <h1 class="page-title">Track Shipment</h1>
      <div class="card form-card">
        <div class="form-group">
          <label for="track-input">Tracking Number or ID</label>
          <div class="input-row">
            <input type="text" id="track-input" placeholder="COL-XXXXXXXX" />
            <button id="track-btn" class="btn btn-primary">Track</button>
          </div>
        </div>
        <div id="track-error" class="alert alert-error hidden"></div>
      </div>
      <div id="track-result"></div>
    </section>

  </main>

  <!-- Update Status Modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <h2 class="modal-title">Update Status</h2>
      <p id="modal-tracking" class="modal-tracking"></p>
      <div class="form-group">
        <label for="modal-status">New Status</label>
        <select id="modal-status" class="select-input">
          <option value="pending">Pending</option>
          <option value="in_transit">In Transit</option>
          <option value="out_for_delivery">Out for Delivery</option>
          <option value="delivered">Delivered</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </div>
      <div class="form-group">
        <label for="modal-note">Note (optional)</label>
        <input type="text" id="modal-note" placeholder="e.g. Departed hub" />
      </div>
      <div id="modal-error" class="alert alert-error hidden"></div>
      <div class="modal-actions">
        <button id="modal-cancel" class="btn btn-secondary">Cancel</button>
        <button id="modal-save" class="btn btn-primary">Save</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
